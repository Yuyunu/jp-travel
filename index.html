<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F4ECDC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="日語旅遊">
  <meta name="description" content="N5 程度旅遊情境日語：對話、單字、自我測驗（離線可用）">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png?v=2" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/icon-192.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2">
  <title>日本旅遊日語</title>
</head>
<body>

  <!-- 頂部 bar -->
  <header class="app-header">
    <div class="header-deco" aria-hidden="true"></div>
    <div class="header-inner">
      <div class="header-left">
        <span class="header-emoji" aria-hidden="true">⛩️</span>
        <h1 class="header-title">日本旅遊日語</h1>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="header-btn" title="深淺色" aria-label="切換深淺色">
          <span class="theme-icon-light">☀</span>
          <span class="theme-icon-dark">🌙</span>
        </button>
        <button id="settings-btn" class="header-btn" title="設定" aria-label="設定">⚙</button>
      </div>
    </div>
  </header>

  <!-- 主內容 -->
  <main class="app-main">

    <!-- Tab 1：情境對話 -->
    <section id="tab-dialogues" class="tab-panel active" role="tabpanel" aria-labelledby="nav-dialogues">
      <div id="dialogues-view"></div>
    </section>

    <!-- Tab 2：場景單字 -->
    <section id="tab-vocab" class="tab-panel" role="tabpanel" aria-labelledby="nav-vocab" hidden>
      <div id="vocab-view"></div>
    </section>

    <!-- Tab 3：自我測驗 -->
    <section id="tab-quiz" class="tab-panel" role="tabpanel" aria-labelledby="nav-quiz" hidden>
      <div id="quiz-view"></div>
    </section>

  </main>

  <!-- 設定 modal -->
  <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="settings-title">設定</h2>
        <button id="settings-close" class="header-btn" aria-label="關閉">✕</button>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">語音</div>
        <div class="field-row">
          <label class="field-label" for="voice-select">日語語音</label>
          <select id="voice-select"></select>
        </div>
        <div class="field-row">
          <label class="field-label" for="rate-range">朗讀速度 <span id="rate-val">0.9</span>x</label>
          <input id="rate-range" type="range" min="0.5" max="1.2" step="0.05" value="0.9">
        </div>
        <div class="field-row">
          <button id="voice-test" class="btn-secondary">試聽</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">外觀</div>
        <div class="field-row">
          <label class="field-label">深淺色</label>
          <div class="radio-group">
            <label><input type="radio" name="theme" value="auto"> 自動</label>
            <label><input type="radio" name="theme" value="light"> 淺</label>
            <label><input type="radio" name="theme" value="dark"> 深</label>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">資料</div>
        <div class="btn-row">
          <button id="reset-progress" class="btn-danger">重置學習進度</button>
        </div>
        <p class="hint">會清掉「已會」「待加強」標記、測驗歷史。對話跟單字本身不會動到。</p>
      </div>

      <div class="settings-section">
        <p class="hint">版本 <span id="app-version">v0.1.0</span> · <span id="tts-status">TTS 偵測中…</span></p>
      </div>
    </div>
  </div>

  <!-- 底部 tab bar -->
  <nav class="tab-bar" role="tablist">
    <button class="tab-btn active" id="nav-dialogues" data-tab="tab-dialogues" role="tab" aria-selected="true">
      <span class="tab-icon">📖</span>
      <span class="tab-label">對話</span>
    </button>
    <button class="tab-btn" id="nav-vocab" data-tab="tab-vocab" role="tab" aria-selected="false">
      <span class="tab-icon">📚</span>
      <span class="tab-label">單字</span>
    </button>
    <button class="tab-btn" id="nav-quiz" data-tab="tab-quiz" role="tab" aria-selected="false">
      <span class="tab-icon">🎯</span>
      <span class="tab-label">測驗</span>
    </button>
  </nav>

  <script src="app.js?v=2"></script>
</body>
</html>
